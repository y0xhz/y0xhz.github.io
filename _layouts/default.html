<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="keywords" content="senior penetration tester indonesia, red team operator, offensive security researcher, malware development, CTF, cloud pentesting, mobile security, EDR evasion">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="theme-color" content="#FF0055">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="crt-overlay" aria-hidden="true"></div>

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-container">
      <div class="nav-brand"><a href="{{ '/' | relative_url }}">▶ y0xhz</a></div>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">START</a></li>
        <li><a href="{{ '/about' | relative_url }}">About</a></li>
        <li><a href="{{ '/red-team-arsenal' | relative_url }}">Arsenal</a></li>
        <li><a href="{{ '/ai-skills' | relative_url }}">AI Skills</a></li>
        <li><a href="{{ '/ctf-writeups' | relative_url }}">Writeups</a></li>
        <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
        <li><a href="{{ '/certifications' | relative_url }}">Certs</a></li>
        <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/speaking' | relative_url }}">Speaking</a></li>
        <li><a href="{{ '/contact' | relative_url }}">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content" class="site-main" role="main">
    {{ content }}
  </main>

  <footer class="site-footer" role="contentinfo">
    <p class="press-start">▶ PRESS START</p>
    <p style="font-size:0.5rem; margin-top:1rem; color:#555;">
      © {{ 'now' | date: '%Y' }} y0xhz · Senior Penetration Tester · Indonesia<br>
      Built with Jekyll · Retro Game Aesthetic
    </p>
  </footer>

  <script>
    // Simple console easter egg
    console.log('%c▶ PLAYER 1 READY', 'color:#FF0055; font-size:24px; font-weight:bold;');
    console.log('%cy0xhz | Red Team Operator | https://y0xhz.github.io', 'color:#00FF00; font-size:14px;');
  </script>
</body>
</html>
